# =================================================================================
# DECISION DETECTION RULES – MEMIX
# =================================================================================
# Rules are evaluated in order. First match wins for each trigger type.
# Placeholders:
#   {name}, {version}, {file}, {path}, {old_path}, {new_path}, {method}, {key}, {value}
#   {pattern}, {pattern_id}, {pattern_name}, {confidence}, {from_file}, {specifier}, {resolved_to}
#
# Conditions support:
#   file_pattern         – regex on file name
#   path_pattern         – regex on full file/directory path
#   language             – programming language (e.g., "typescript", "python")
#   ast_pattern          – tree-sitter query pattern
#   dependency_pattern   – regex for package name
#   key_pattern          – regex for config key
#   value_pattern        – regex for config value
#   min_confidence       – minimum confidence to record (0.0–1.0)
# =================================================================================


# ─────────────────────────────────────────────────────────────────────────────
# 1. DEPENDENCY DECISIONS (Frontend Frameworks)
# ─────────────────────────────────────────────────────────────────────────────

[[rule]]
id = "dep_react"
name = "React UI Framework"
trigger = "dependency_added"
condition = { dependency_pattern = "^(react|react-dom|react-native|next|remix|gatsby)$" }
template.title = "Use {name} for UI framework"
template.rationale = "Added {name}@{version} to {file}. This establishes {name} as the primary UI framework, enabling component-based architecture and reactive state management."
template.tags = ["dependency", "ui", "framework"]
template.alternatives = ["Vue", "Svelte", "Angular", "Solid"]
confidence = 0.95

