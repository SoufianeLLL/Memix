on_empty = "prettier: ok"

[filters.ruff]
description = "Compact ruff lint output"
match_command = "^ruff\\s+(check|format)"
strip_ansi = true
strip_lines_matching = ["^$"]
max_lines = 30
on_empty = "ruff: ok"

[filters.biome]
description = "Compact Biome lint/format output"
match_command = "^biome\\b"
strip_ansi = true
strip_lines_matching = [
  "^\\s*$",
  "^Checked \\d+ file",
  "^Fixed \\d+ file",
]
max_lines = 50
on_empty = "biome: ok"

[filters.shellcheck]
description = "Compact shellcheck output"
match_command = "^shellcheck"
strip_ansi = true
strip_lines_matching = ["^$"]
max_lines = 30

[files.yamllint]
description = "Compact yamllint output"
match_command = "^yamllint"
strip_ansi = true
strip_lines_matching = ["^$"]
max_lines = 30

