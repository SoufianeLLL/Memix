# Memix Built-in TOML Filters
# These filters reduce token consumption by 60-90% for common commands

schema_version = 1

# ---------------------------------------------------------------------------
# Git Commands
# ---------------------------------------------------------------------------

[filters.git-status]
description = "Compact git status - strip branch info decorations"
match_command = "^git\\s+status"
strip_ansi = true
strip_lines_matching = [
  "^On branch",
  "^Your branch is",
  "nothing to commit",
  "working tree clean",
]
max_lines = 30
on_empty = "git: clean"

[filters.git-log]
description = "Compact git log - one line per commit"
match_command = "^git\\s+log"
strip_ansi = true
max_lines = 20

[filters.git-diff]
description = "Compact git diff - strip file mode changes"
match_command = "^git\\s+diff"
strip_ansi = true
strip_lines_matching = [
  "^index [a-f0-9]+\\.{2}",
  "^diff --git",
  "^--- a/",
  "^\\+\\+\\+ b/",
]
max_lines = 100

[filters.git-add]
description = "Silent git add - only show errors"
match_command = "^git\\s+add"
strip_ansi = true
strip_lines_matching = ["^$"]
max_lines = 5
on_empty = "git add: ok"

[filters.git-commit]
description = "Compact git commit output"
match_command = "^git\\s+commit"
strip_ansi = true
strip_lines_matching = [
  "^\\[",
  "^\\s*$",
  "^create mode",
]
max_lines = 10

[filters.git-push]
description = "Compact git push - show summary only"
match_command = "^git\\s+push"
strip_ansi = true
max_lines = 10

[filters.git-pull]
description = "Compact git pull - strip merge details"
match_command = "^git\\s+pull"
strip_ansi = true
strip_lines_matching = [
  "^Updating [a-f0-9]+\\.{2}",
  "^Fast-forward",
]
max_lines = 15

# ---------------------------------------------------------------------------
# Package Managers
# ---------------------------------------------------------------------------

[filters.npm-install]
description = "Silent npm install - only show errors"
match_command = "^npm\\s+(i|install|ci)"
strip_ansi = true
strip_lines_matching = [
  "^$",
  "^npm WARN",
  "up to date",
  "added",
  "removed",
]
max_lines = 5
on_empty = "npm install: ok"

[filters.yarn-install]
description = "Silent yarn install"
match_command = "^yarn(\\s+install)?"
strip_ansi = true
strip_lines_matching = ["^$"]
max_lines = 5
on_empty = "yarn: ok"

[filters.pnpm-install]
description = "Silent pnpm install"
match_command = "^pnpm\\s+install"
strip_ansi = true
strip_lines_matching = ["^$"]
max_lines = 5
on_empty = "pnpm: ok"

[filters.pip-install]
description = "Compact pip install - strip download progress"
match_command = "^pip(3)?\\s+install"
strip_ansi = true
strip_lines_matching = [
  "^Collecting",
  "^  Using cached",
  "^Downloading",
  "Successfully installed",
]
max_lines = 10
on_empty = "pip: ok"

[filters.cargo-build]
description = "Compact cargo build - strip compilation progress"
match_command = "^cargo\\s+(build|check|clippy)"
strip_ansi = true
strip_lines_matching = [
  "^   Compiling",
  "^    Checking",
  "^    Finished",
  "^     Running",
]
max_lines = 30

[filters.cargo-test]
description = "Compact cargo test - show failures only"
match_command = "^cargo\\s+test"
strip_ansi = true
strip_lines_matching = [
  "^running \\d+ tests",
  "^test result:",
  "^$",
]
keep_lines_matching = ["FAILED", "error", "panic"]
max_lines = 30
on_empty = "cargo test: passed"

[filters.cargo-update]
description = "Compact cargo update output"
match_command = "^cargo\\s+update"
strip_ansi = true
strip_lines_matching = ["^$"]
max_lines = 20

