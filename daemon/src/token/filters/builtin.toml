# ---------------------------------------------------------------------------
# Docker
# ---------------------------------------------------------------------------

[filters.docker-ps]
description = "Compact docker ps - strip headers"
match_command = "^docker\\s+ps"
strip_ansi = true
strip_lines_matching = ["^CONTAINER ID"]
max_lines = 20

[filters.docker-build]
description = "Compact docker build - strip step progress"
match_command = "^docker\\s+build"
strip_ansi = true
strip_lines_matching = [
  "^Step \\d+/",
  "^#\\d+",
  "^$",
]
max_lines = 20

[filters.docker-compose]
description = "Compact docker-compose output"
match_command = "^docker-compose|^docker\\s+compose"
strip_ansi = true
strip_lines_matching = ["^$"]
max_lines = 30

# ---------------------------------------------------------------------------
# Testing
# ---------------------------------------------------------------------------

[filters.jest]
description = "Compact Jest test output"
match_command = "^jest|^npx\\s+jest"
strip_ansi = true
strip_lines_matching = [
  "^PASS",
  "^$",
  "^\\s*\\^+",
]
max_lines = 50
on_empty = "jest: passed"

[filters.pytest]
description = "Compact pytest output - show failures only"
match_command = "^pytest"
strip_ansi = true
strip_lines_matching = [
  "^=+$",
  "^-+$",
  "^$",
  "^PASSED",
  "^test session starts",
]
keep_lines_matching = ["FAILED", "ERROR", "failed"]
max_lines = 30
on_empty = "pytest: passed"

[filters.vitest]
description = "Compact Vitest output"
match_command = "^vitest|^npx\\s+vitest"
strip_ansi = true
strip_lines_matching = ["^$"]
max_lines = 50
on_empty = "vitest: passed"

