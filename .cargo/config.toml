# Ensures x86-64 cross-compilation stays at the baseline CPU
# and doesn't emit AVX-512 instructions that older hardware can't run.
[target.x86_64-apple-darwin]
rustflags = ["-C", "target-cpu=x86-64"]

[target.x86_64-unknown-linux-musl]
rustflags = ["-C", "target-cpu=x86-64"]

[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "target-cpu=x86-64"]