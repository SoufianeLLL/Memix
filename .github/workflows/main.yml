name: Memix CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
        
    - name: Install Rust Toolchain
      uses: dtolnay/rust-toolchain@stable
      
    - name: Install Dependencies
      run: npm install
      
    - name: Compile Extension
      run: npm run compile
      
    - name: Run Tests
      run: npm test
