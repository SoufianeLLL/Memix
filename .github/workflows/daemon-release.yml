name: Daemon Release

on:
  push:
    tags:
      - 'daemon-v*'
  workflow_dispatch:
    inputs:
      min_extension_version:
        description: 'Minimum extension version required for this daemon (e.g. 1.2.0). Leave empty if no breaking changes.'
        required: false
        default: ''
      platform:
        description: 'Platform to build (leave empty for all)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - windows
          - linux
          - macos-arm64
          - macos-x64

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.binary }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            binary: memix-daemon-darwin-arm64
            deployment_target: '12.0'

          - os: macos-14
            target: x86_64-apple-darwin
            binary: memix-daemon-darwin-x64
            deployment_target: '12.0'

          - os: ubuntu-22.04
            target: x86_64-unknown-linux-musl
            binary: memix-daemon-linux-x64
            deployment_target: ''

          - os: windows-2022
            target: x86_64-pc-windows-msvc
            binary: memix-daemon-windows-x64.exe
            deployment_target: ''

    steps:
      - uses: actions/checkout@v6

      - name: Download embedding model
        shell: bash
        run: bash scripts/download_model.sh

      # Setup protoc - this works on ALL platforms!
      - name: Setup protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '25.1'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Rust cache after Install Rust step
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: daemon
          key: ${{ matrix.target }}-v2

      # Only need musl tools for Linux (protoc is already handled above)
      - name: Install musl tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      # Optional debug step - verify protoc is working
      - name: Verify protoc
        run: protoc --version

      - name: Build
        working-directory: daemon
        env:
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.deployment_target }}
          PROTOC_NO_VENDOR: 1
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          mkdir -p dist
          if [[ "${{ matrix.os }}" == "windows-2022" ]]; then
            cp daemon/target/${{ matrix.target }}/release/memix-daemon.exe dist/${{ matrix.binary }}
          else
            cp daemon/target/${{ matrix.target }}/release/memix-daemon dist/${{ matrix.binary }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.binary }}
          path: dist/${{ matrix.binary }}

  release:
    name: Create Release + Manifest
    needs: build
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare binaries for release
        run: |
          mkdir -p release-assets
          # Find and copy all binaries to release-assets
          find artifacts -type f -name "memix-daemon-*" -exec cp {} release-assets/ \;
          echo "Files ready for release:"
          ls -la release-assets/

      - name: Compute SHA-256 checksums
        id: checksums
        run: |
          cd release-assets
          # Clear the file
          > ../checksums.txt
          # Loop through files and generate clean output
          for f in memix-daemon-*; do
            if [ -f "$f" ]; then
              echo "Processing: $f"
              # Get the base filename without any path
              filename=$(basename "$f")
              # Calculate checksum and append with clean filename
              sha256sum "$f" | awk '{print $1 "  " filename}' filename="$filename" >> ../checksums.txt
            fi
          done
          echo "=== Final checksums.txt content ==="
          cat ../checksums.txt

      - name: Generate manifest.json
        run: |
          VERSION="${GITHUB_REF_NAME#daemon-v}"
          node -e "
            const fs = require('fs');
            const checksums = {};
            
            console.log('Reading checksums.txt...');
            const content = fs.readFileSync('checksums.txt', 'utf8');
            console.log('Raw content:', content);
            
            const lines = content.trim().split('\n');
            for (const line of lines) {
              if (line.trim()) {
                const parts = line.trim().split(/\s+/);
                const hash = parts[0];
                // The filename might have spaces, so join the rest
                const file = parts.slice(1).join(' ');
                console.log(\`Found: hash='\${hash}', file='\${file}'\`);
                
                // Extract platform from filename (remove 'memix-daemon-' prefix)
                let platform = file.replace('memix-daemon-', '');
                // Store with the exact platform name
                checksums[platform] = hash;
                console.log(\`  -> Stored checksums['\${platform}'] = \${hash}\`);
              }
            }
            
            const base = 'https://github.com/' + process.env.GITHUB_REPOSITORY + '/releases/download/' + process.env.GITHUB_REF_NAME;
            const manifest = {
              version: process.env.VERSION,
              released_at: new Date().toISOString(),
              // Only include minExtensionVersion if explicitly set (workflow_dispatch or repo var)
              ...(process.env.MIN_EXTENSION_VERSION ? { minExtensionVersion: process.env.MIN_EXTENSION_VERSION } : {}),
              binaries: {
                'darwin-arm64':  { url: base + '/memix-daemon-darwin-arm64',      sha256: checksums['darwin-arm64'] || checksums['darwin-arm64.exe'] || '' },
                'darwin-x64':    { url: base + '/memix-daemon-darwin-x64',        sha256: checksums['darwin-x64'] || checksums['darwin-x64.exe'] || '' },
                'linux-x64':     { url: base + '/memix-daemon-linux-x64',         sha256: checksums['linux-x64'] || checksums['linux-x64.exe'] || '' },
                'windows-x64':   { url: base + '/memix-daemon-windows-x64.exe',   sha256: checksums['windows-x64.exe'] || checksums['windows-x64'] || '' },
              }
            };
            
            console.log('\\n=== Final Manifest Object ===');
            console.log(JSON.stringify(manifest, null, 2));
            
            fs.writeFileSync('manifest.json', JSON.stringify(manifest, null, 2));
            
            // Verify all required fields are present
            const required = ['darwin-arm64', 'darwin-x64', 'linux-x64', 'windows-x64'];
            let missing = [];
            for (const platform of required) {
              if (!manifest.binaries[platform].sha256) {
                missing.push(platform);
              }
            }
            
            if (missing.length > 0) {
              console.error('\\n❌ ERROR: Missing SHA256 for:', missing.join(', '));
              process.exit(1);
            } else {
              console.log('\\n✅ All required SHA256 checksums present!');
            }
          "
        env:
          VERSION: ${{ github.ref_name }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          # workflow_dispatch input takes priority; fall back to the repo-level variable
          MIN_EXTENSION_VERSION: ${{ github.event.inputs.min_extension_version || vars.MIN_EXTENSION_VERSION || '' }}

      - name: Normalize manifest version
        run: |
          node -e "
            const fs = require('fs');
            const manifest = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
            manifest.version = manifest.version.replace(/^daemon-v/, '').replace(/^v/, '');
            fs.writeFileSync('manifest.json', JSON.stringify(manifest, null, 2));
            console.log(JSON.stringify(manifest, null, 2));
          "

      - name: Debug - List files before upload
        run: |
          echo "Current directory: $(pwd)"
          echo "Contents of current directory:"
          ls -la
          echo "Contents of release-assets folder:"
          ls -la release-assets/ || echo "release-assets folder not found"
          echo "Searching for binaries:"
          find . -name "memix-daemon-*" -type f
          
      - name: Upload binaries to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Daemon ${{ github.ref_name }}"
          files: |
            release-assets/memix-daemon-*
            manifest.json
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push manifest to api.memix.dev
        continue-on-error: true  # non-fatal: don't block the release if the API is temporarily down
        run: |
          RESPONSE_FILE=$(mktemp)
          HTTP_CODE=$(curl --silent --show-error \
            --output "$RESPONSE_FILE" \
            --write-out "%{http_code}" \
            -X POST https://api.memix.dev/daemon/manifest \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.MANIFEST_DEPLOY_SECRET }}" \
            -d @manifest.json)

          cat "$RESPONSE_FILE"

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "❌ Manifest POST failed with status $HTTP_CODE"
            exit 1
          else
            echo "✅ Manifest successfully pushed to API"
          fi